<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🍫 巧克力扫雷</title>
<link rel="icon" href="/favicon.svg" />
<link rel="stylesheet" href="/src/styles/shared.css" />
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    position: relative;
  }
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    z-index: 1;
    position: relative;
  }

  .title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .top-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .info-box {
    text-align: center;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(6px);
    padding: 8px 16px;
    border-radius: var(--radius-md);
    border: 2px solid var(--pink);
    box-shadow: var(--shadow-sm);
  }
  .info-box .label { font-size: 11px; color: var(--text-light); font-weight: 600; }
  .info-box .value { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: #8B5E3C; }

  .diff-btns {
    display: flex;
    gap: 8px;
  }
  .diff-btn {
    padding: 6px 14px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    border: 2px solid var(--mint);
    background: var(--white);
    color: var(--text);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .diff-btn.active {
    background: var(--mint-light);
    border-color: #80cbc4;
    color: #00695c;
  }
  .diff-btn:hover { background: var(--mint-light); }

  .board-frame {
    background: #fff;
    border-radius: var(--radius-lg);
    padding: 8px;
    box-shadow: var(--shadow-lg), 0 0 0 3px var(--pink);
  }
  canvas { display: block; border-radius: var(--radius-md); background: #faf5f2; }

  .num-1 { color: #5D9CEC; }
  .num-2 { color: #4FC47F; }
  .num-3 { color: #ED5565; }
  .num-4 { color: #8067B7; }
  .num-5 { color: #AC92EC; }
  .num-6 { color: #48CFAD; }
  .num-7 { color: #8B5E3C; }
  .num-8 { color: #656D78; }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="title">🍫 巧克力扫雷</div>

  <div class="top-row">
    <div class="diff-btns">
      <button class="diff-btn" data-diff="0">简单 9×9</button>
      <button class="diff-btn active" data-diff="1">中等 16×16</button>
      <button class="diff-btn" data-diff="2">困难 16×30</button>
    </div>
  </div>

  <div class="top-row">
    <div class="info-box">
      <div class="label">🍫 剩余</div>
      <div class="value" id="mineCount">40</div>
    </div>
    <div class="info-box">
      <div class="label">⏱ 时间</div>
      <div class="value" id="timerVal">0</div>
    </div>
    <button class="btn btn-primary" id="btnNew">🔄 新游戏</button>
  </div>

  <div class="board-frame">
    <canvas id="board"></canvas>
  </div>
</div>

<a href="index.html" class="back-btn">← 大厅</a>

<script type="module">
import { getHighScore, setHighScore } from "/src/js/storage.js";

const DIFFS = [
  { name: "简单", rows: 9, cols: 9, mines: 10 },
  { name: "中等", rows: 16, cols: 16, mines: 40 },
  { name: "困难", rows: 16, cols: 30, mines: 99 },
];

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let CELL = 36;
let rows, cols, totalMines;
let board = [];       // -1 = mine, 0-8 = adjacent count
let revealed = [];    // boolean
let flagged = [];     // boolean
let gameOver = false;
let gameWon = false;
let firstClick = true;
let minesLeft = 0;
let timerVal = 0;
let timerInterval = null;
let currentDiff = 1;

const elMine = document.getElementById("mineCount");
const elTimer = document.getElementById("timerVal");
const elBtn = document.getElementById("btnNew");
const diffBtns = document.querySelectorAll(".diff-btn");

function init(diffIdx) {
  currentDiff = diffIdx;
  const d = DIFFS[diffIdx];
  rows = d.rows;
  cols = d.cols;
  totalMines = d.mines;
  minesLeft = totalMines;

  CELL = Math.max(28, Math.min(40, Math.floor((Math.min(window.innerWidth - 60, 720)) / cols)));
  canvas.width = cols * CELL;
  canvas.height = rows * CELL;

  board = Array.from({ length: rows }, () => new Array(cols).fill(0));
  revealed = Array.from({ length: rows }, () => new Array(cols).fill(false));
  flagged = Array.from({ length: rows }, () => new Array(cols).fill(false));
  gameOver = false;
  gameWon = false;
  firstClick = true;
  timerVal = 0;

  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  elTimer.textContent = "0";
  elMine.textContent = minesLeft;

  diffBtns.forEach(b => b.classList.remove("active"));
  diffBtns[diffIdx].classList.add("active");

  draw();
}

function placeMines(safeR, safeC) {
  // Build safe zone
  const safeZone = new Set();
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const r = safeR + dr, c = safeC + dc;
      if (r >= 0 && r < rows && c >= 0 && c < cols) safeZone.add(`${r},${c}`);
    }
  }

  let placed = 0;
  while (placed < totalMines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (safeZone.has(`${r},${c}`) || board[r][c] === -1) continue;
    board[r][c] = -1;
    placed++;
  }

  // Calculate numbers
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c] === -1) continue;
      let cnt = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) cnt++;
        }
      }
      board[r][c] = cnt;
    }
  }
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;

  revealed[r][c] = true;

  if (board[r][c] === 0) {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        reveal(r + dr, c + dc);
      }
    }
  }
}

function checkWin() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c] !== -1 && !revealed[r][c]) return false;
    }
  }
  return true;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = c * CELL, y = r * CELL;
      const cx = x + CELL / 2, cy = y + CELL / 2;

      if (revealed[r][c]) {
        // Revealed cell
        ctx.fillStyle = "#f0e8e0";
        ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);

        if (board[r][c] === -1) {
          // Mine
          ctx.font = `${CELL * 0.6}px sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("🍫", cx, cy + 1);
        } else if (board[r][c] > 0) {
          // Number
          ctx.font = `bold ${CELL * 0.55}px 'Quicksand', sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          const numColors = ["", "#5D9CEC", "#4FC47F", "#ED5565", "#8067B7", "#AC92EC", "#48CFAD", "#8B5E3C", "#656D78"];
          ctx.fillStyle = numColors[board[r][c]] || "#333";
          ctx.fillText(board[r][c], cx, cy + 1);
        }
      } else {
        // Unrevealed cell
        const isPressed = false;
        ctx.fillStyle = "#d4c5b9";
        ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);

        // 3D effect
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.fillRect(x + 1, y + 1, CELL - 2, 2);
        ctx.fillRect(x + 1, y + 1, 2, CELL - 2);
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(x + 1, y + CELL - 3, CELL - 2, 2);
        ctx.fillRect(x + CELL - 3, y + 1, 2, CELL - 2);

        if (flagged[r][c]) {
          // Flag
          ctx.font = `${CELL * 0.55}px sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("🍭", cx, cy + 1);
        }
      }

      // Grid line
      ctx.strokeStyle = "#c4b5a5";
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, CELL, CELL);
    }
  }

  // Game over overlay
  if (gameOver && !gameWon) {
    ctx.fillStyle = "rgba(250, 240, 235, 0.85)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#8B5E3C";
    ctx.font = `bold ${CELL * 0.7}px 'Quicksand', sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("💥 踩到巧克力炸弹！", canvas.width / 2, canvas.height / 2);
  }
  if (gameWon) {
    ctx.fillStyle = "rgba(250, 240, 235, 0.85)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#8B5E3C";
    ctx.font = `bold ${CELL * 0.7}px 'Quicksand', sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🎉 扫雷成功！", canvas.width / 2, canvas.height / 2);
  }
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    timerVal++;
    elTimer.textContent = timerVal;
  }, 1000);
}

canvas.addEventListener("click", (e) => {
  if (gameOver || gameWon) return;
  const rect = canvas.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / CELL);
  const r = Math.floor((e.clientY - rect.top) / CELL);
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (flagged[r][c]) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTimer();
  }

  if (board[r][c] === -1) {
    // Hit mine
    gameOver = true;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    // Reveal all mines
    for (let rr = 0; rr < rows; rr++)
      for (let cc = 0; cc < cols; cc++)
        if (board[rr][cc] === -1) revealed[rr][cc] = true;
    draw();
    return;
  }

  reveal(r, c);
  if (checkWin()) {
    gameWon = true;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    const prev = getHighScore("minesweeper");
    // Store best time (lower is better) — hack: store as negative for "higher is better"
    const timeScore = timerVal;
    setHighScore("minesweeper_" + currentDiff, -timeScore);
    revealAll();
  }
  draw();
});

canvas.addEventListener("contextmenu", (e) => {
  e.preventDefault();
  if (gameOver || gameWon || firstClick) return;

  const rect = canvas.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / CELL);
  const r = Math.floor((e.clientY - rect.top) / CELL);
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c]) return;

  flagged[r][c] = !flagged[r][c];
  minesLeft += flagged[r][c] ? -1 : 1;
  elMine.textContent = minesLeft;
  draw();
});

function revealAll() {
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (board[r][c] !== -1) revealed[r][c] = true;
}

elBtn.addEventListener("click", () => init(currentDiff));

diffBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    init(parseInt(btn.dataset.diff));
  });
});

window.addEventListener("resize", () => {
  CELL = Math.max(28, Math.min(40, Math.floor((Math.min(window.innerWidth - 60, 720)) / cols)));
  canvas.width = cols * CELL;
  canvas.height = rows * CELL;
  draw();
});

init(1);
</script>
</body>
</html>
