<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>🍬 糖果贪吃蛇</title>
<link rel="icon" href="/favicon.svg" />
<link rel="stylesheet" href="/src/styles/shared.css" />
<style>
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh;
    position: relative; overflow: hidden;
    padding: 8px;
  }
  .game-wrapper {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; position: relative; z-index: 1;
    width: 100%; max-width: 620px;
  }
  .title-ribbon {
    background: linear-gradient(135deg, var(--pink-deep), var(--pink));
    color: #fff; font-family: var(--font-display);
    font-size: clamp(16px, 4vw, 22px); font-weight: 700;
    padding: 6px 24px; border-radius: 30px;
    box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 8px;
  }
  .score-panel { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .stat {
    text-align: center; background: rgba(255,255,255,0.78);
    backdrop-filter: blur(8px); padding: 6px 12px;
    border-radius: var(--radius-md); border: 2px solid var(--pink);
    box-shadow: var(--shadow-sm); min-width: 55px;
  }
  .stat-label { color: var(--text-light); font-size: 10px; font-weight: 600; letter-spacing: 1px; }
  .stat-value { color: var(--pink-deep); font-family: var(--font-display); font-size: 22px; font-weight: 700; }
  .stat-value.best { color: #e75480; }
  .canvas-frame {
    background: #fff; border-radius: var(--radius-lg); padding: 6px;
    box-shadow: var(--shadow-lg), 0 0 0 3px var(--pink);
  }
  canvas { border-radius: var(--radius-md); display: block; background: #fff5f8; max-width: 100%; }
  .controls-hint {
    color: var(--text-light); font-size: 12px; font-weight: 600;
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .controls-hint span { display: flex; align-items: center; gap: 4px; }
  kbd {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    background: #fff; color: var(--pink-deep); font-size: 10px;
    font-family: var(--font-display); font-weight: 600;
    border: 2px solid var(--pink); box-shadow: 0 2px 6px rgba(255,182,193,0.2);
  }
  @media (max-width: 600px) {
    .controls-hint { display: none; }
    .game-wrapper { gap: 6px; }
    .canvas-frame { padding: 4px; }
  }
  .touch-dpad { margin-top:8px; }
  .touch-dpad .dpad-row { display:flex; gap:6px; justify-content:center; }
  .touch-dpad .dpad-btn { width:48px; height:48px; border-radius:14px; border:2px solid var(--pink); background:rgba(255,255,255,0.85); font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  .touch-dpad .dpad-btn:active { background:var(--pink-light); }
  .touch-dpad .dpad-empty { width:48px; height:48px; }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="title-ribbon">🍬 糖果贪吃蛇</div>
  <div class="score-panel">
    <div class="stat"><div class="stat-label">⭐ 得分</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">🏆 最高</div><div class="stat-value best" id="best">0</div></div>
    <div class="stat"><div class="stat-label">🍬 长度</div><div class="stat-value" id="lengthVal">3</div></div>
  </div>
  <div class="canvas-frame"><canvas id="game"></canvas></div>
  <div class="controls-hint">
    <span><kbd>↑↓←→</kbd> / <kbd>WASD</kbd> 移动</span>
    <span><kbd>空格</kbd> 暂停</span>
    <span><kbd>R</kbd> 重新开始</span>
  </div>
</div>
  <div class="touch-dpad" id="dpad">
    <div class="dpad-row">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="dpadUp">▲</button>
      <div class="dpad-empty"></div>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="dpadLeft">◀</button>
      <button class="dpad-btn" id="dpadPause">⏯</button>
      <button class="dpad-btn" id="dpadRight">▶</button>
    </div>
    <div class="dpad-row">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" id="dpadDown">▼</button>
      <div class="dpad-empty"></div>
    </div>
  </div>

<a href="index.html" class="back-btn">← 大厅</a>

<script type="module">
import { getHighScore, setHighScore } from "/src/js/storage.js";

(function() {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const lengthEl = document.getElementById("lengthVal");

  const COLS = 30, ROWS = 30;
  let GRID = 20;

  const BG_COLOR = "#fff5f8", GRID_LINE = "#ffe4ec";
  const HEAD_COLOR = "#ffb6c1", BODY_COLOR = "#ff9ec4", BODY_ALT = "#f8a0b8";
  const FOOD_COLOR = "#ff6b8a", OVERLAY_BG = "rgba(255, 240, 245, 0.88)";

  let snake, food, dir, nextDir, score, best, speed, gameLoop, paused, gameOver, particles;
  const candyEmojis = ["🍬","🍭","🍡","🍫","🧁","🍪","🍩","🍦"];

  function resizeCanvas() {
    const maxW = Math.min(window.innerWidth - 28, 600);
    const maxH = Math.min(window.innerHeight - 240, 600);
    GRID = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
    if (GRID < 10) GRID = 10;
    canvas.width = COLS * GRID;
    canvas.height = ROWS * GRID;
  }

  function init() {
    resizeCanvas();
    const cx = Math.floor(COLS/2), cy = Math.floor(ROWS/2);
    snake = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    score = 0; speed = 120; food = null; particles = [];
    gameOver = false; paused = false;
    spawnFood(); updateUI(); bestEl.textContent = best;
  }

  function spawnFood() {
    const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
    const pool = [];
    for (let x=0;x<COLS;x++) for (let y=0;y<ROWS;y++)
      if (!occupied.has(`${x},${y}`)) pool.push({x,y});
    if (pool.length===0) return;
    food = pool[Math.floor(Math.random()*pool.length)];
  }

  function updateUI() {
    scoreEl.textContent = score;
    lengthEl.textContent = snake.length;
    if (score > best) { best = score; setHighScore("snake", best); bestEl.textContent = best; }
  }

  function step() {
    if (paused || gameOver) return;
    dir = {...nextDir};
    const head = snake[0];
    const nh = {x:head.x+dir.x, y:head.y+dir.y};
    if (nh.x<0||nh.x>=COLS||nh.y<0||nh.y>=ROWS) { endGame(); return; }
    for (const s of snake) if (s.x===nh.x&&s.y===nh.y) { endGame(); return; }

    snake.unshift(nh);
    if (food && nh.x===food.x && nh.y===food.y) {
      score+=10; spawnParticles(food.x,food.y); food=null; spawnFood(); updateUI();
      if (speed>60) { speed-=1; restartLoop(); }
    } else { snake.pop(); }
  }

  function restartLoop() {
    if (gameLoop) clearInterval(gameLoop);
    if (!gameOver && !paused) gameLoop = setInterval(step, speed);
  }

  function endGame() {
    gameOver=true; if(gameLoop)clearInterval(gameLoop); gameLoop=null;
    spawnDeathParticles(snake[0].x,snake[0].y); draw();
  }

  function spawnParticles(gx,gy) {
    for (let i=0;i<8;i++) particles.push({
      x:gx*GRID+GRID/2,y:gy*GRID+GRID/2,
      vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3-1,
      life:1,decay:0.03,color:"#ffb6c1",size:3
    });
  }
  function spawnDeathParticles(gx,gy) {
    for (let i=0;i<12;i++) particles.push({
      x:gx*GRID+GRID/2,y:gy*GRID+GRID/2,
      vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,
      life:1,decay:0.018,color:"#ffb6c1",size:3
    });
  }

  function updateParticles() {
    particles = particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;return p.life>0;});
  }

  function drawGrid() {
    ctx.strokeStyle=GRID_LINE;ctx.lineWidth=0.5;
    for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*GRID,0);ctx.lineTo(x*GRID,canvas.height);ctx.stroke();}
    for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*GRID);ctx.lineTo(canvas.width,y*GRID);ctx.stroke();}
  }

  function drawSnake() {
    for (let i=snake.length-1;i>=0;i--) {
      const s=snake[i],pad=1.5,x=s.x*GRID+pad,y=s.y*GRID+pad,w=GRID-pad*2;
      if(i===0) {
        const cx=x+w/2,cy=y+w/2,r=w/2;
        ctx.shadowColor="rgba(255,105,180,0.4)";ctx.shadowBlur=4;
        ctx.fillStyle=HEAD_COLOR;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
        const er=r*0.45,eo=r*0.55;
        ctx.fillStyle=HEAD_COLOR;
        ctx.beginPath();ctx.arc(cx-eo,cy-eo,er,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+eo,cy-eo,er,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#ffd0dc";
        ctx.beginPath();ctx.arc(cx-eo,cy-eo,er*0.6,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+eo,cy-eo,er*0.6,0,Math.PI*2);ctx.fill();
        let bx,by;
        if(dir.x===1){bx=cx+r*0.5;by=cy-r*0.55}else if(dir.x===-1){bx=cx-r*0.5;by=cy-r*0.55}
        else if(dir.y===-1){bx=cx;by=cy-r*0.85}else{bx=cx;by=cy-r*0.25}
        ctx.fillStyle="#ff1744";ctx.beginPath();ctx.arc(bx,by,r*0.2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(bx-r*0.4,by-r*0.15,r*0.35,r*0.18,-0.3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(bx+r*0.4,by-r*0.15,r*0.35,r*0.18,0.3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.moveTo(bx-r*0.15,by+r*0.1);ctx.lineTo(bx-r*0.25,by+r*0.45);ctx.lineTo(bx-r*0.05,by+r*0.3);ctx.fill();
        ctx.beginPath();ctx.moveTo(bx+r*0.15,by+r*0.1);ctx.lineTo(bx+r*0.25,by+r*0.45);ctx.lineTo(bx+r*0.05,by+r*0.3);ctx.fill();
        const eyeR=r*0.28;let ex1,ey1,ex2,ey2;
        if(dir.x===1){ex1=cx+r*0.15;ey1=cy-r*0.1;ex2=cx+r*0.55;ey2=cy-r*0.1}
        else if(dir.x===-1){ex1=cx-r*0.15;ey1=cy-r*0.1;ex2=cx-r*0.55;ey2=cy-r*0.1}
        else if(dir.y===-1){ex1=cx-r*0.25;ey1=cy-r*0.35;ex2=cx+r*0.25;ey2=cy-r*0.35}
        else{ex1=cx-r*0.25;ey1=cy+r*0.1;ex2=cx+r*0.25;ey2=cy+r*0.1}
        ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex1,ey1,eyeR,0,Math.PI*2);ctx.arc(ex2,ey2,eyeR,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#1a1a2e";ctx.beginPath();ctx.arc(ex1,ey1,eyeR*0.6,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(ex2,ey2,eyeR*0.6,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(ex1-eyeR*0.2,ey1-eyeR*0.2,eyeR*0.25,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(ex2-eyeR*0.2,ey2-eyeR*0.2,eyeR*0.25,0,Math.PI*2);ctx.fill();
        let nx,ny;
        if(dir.x===1){nx=cx+r*0.65;ny=cy+r*0.15}else if(dir.x===-1){nx=cx-r*0.65;ny=cy+r*0.15}
        else if(dir.y===-1){nx=cx;ny=cy-r*0.65}else{nx=cx;ny=cy+r*0.5}
        ctx.fillStyle="#ffdd57";ctx.beginPath();ctx.ellipse(nx,ny,r*0.14,r*0.1,0,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle="rgba(0,0,0,0.18)";ctx.lineWidth=0.6;
        ctx.beginPath();ctx.moveTo(nx-r*0.9,ny-r*0.25);ctx.lineTo(nx-r*0.3,ny-r*0.05);ctx.stroke();
        ctx.beginPath();ctx.moveTo(nx-r*0.9,ny+r*0.05);ctx.lineTo(nx-r*0.3,ny+r*0.1);ctx.stroke();
        ctx.beginPath();ctx.moveTo(nx+r*0.9,ny-r*0.25);ctx.lineTo(nx+r*0.3,ny-r*0.05);ctx.stroke();
        ctx.beginPath();ctx.moveTo(nx+r*0.9,ny+r*0.05);ctx.lineTo(nx+r*0.3,ny+r*0.1);ctx.stroke();
      } else {
        const br=w/2,bcx=x+w/2,bcy=y+w/2;
        ctx.fillStyle=i%2===0?BODY_ALT:BODY_COLOR;
        ctx.shadowColor="rgba(255,105,180,0.2)";ctx.shadowBlur=2;
        ctx.beginPath();ctx.arc(bcx,bcy,br,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
        ctx.fillStyle="rgba(255,255,255,0.35)";
        ctx.beginPath();ctx.arc(bcx-br*0.25,bcy-br*0.25,br*0.3,0,Math.PI*2);ctx.fill();
      }
    }
  }

  function drawFood() {
    if(!food)return;const cx=food.x*GRID+GRID/2,cy=food.y*GRID+GRID/2,r=GRID/2-2;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r+4);
    g.addColorStop(0,"rgba(255,107,138,0.22)");g.addColorStop(1,"transparent");
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r+4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=FOOD_COLOR;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.5)";ctx.lineWidth=1.5;ctx.beginPath();
    for(let a=0;a<Math.PI*4;a+=0.3){const rr=(a/(Math.PI*4))*r*0.8;const px=cx+Math.cos(a)*rr,py=cy+Math.sin(a)*rr;if(a===0)ctx.moveTo(cx,cy);else ctx.lineTo(px,py);}ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,0.4)";ctx.beginPath();ctx.arc(cx-r*0.25,cy-r*0.3,r*0.28,0,Math.PI*2);ctx.fill();
  }

  function drawHeart(cx,cy,size){ctx.beginPath();ctx.moveTo(cx,cy+size*0.3);ctx.bezierCurveTo(cx,cy-size*0.1,cx-size,cy-size*0.1,cx-size,cy+size*0.3);ctx.bezierCurveTo(cx-size,cy+size*0.8,cx,cy+size,cx,cy+size);ctx.bezierCurveTo(cx,cy+size,cx+size,cy+size*0.8,cx+size,cy+size*0.3);ctx.bezierCurveTo(cx+size,cy-size*0.1,cx,cy-size*0.1,cx,cy+size*0.3);ctx.closePath();}

  function drawParticles(){for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.color;drawHeart(p.x,p.y,p.size);ctx.fill();}ctx.globalAlpha=1;}

  function drawOverlay() {
    if(!paused&&!gameOver)return;
    ctx.fillStyle=OVERLAY_BG;ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign="center";ctx.textBaseline="middle";
    const fs = Math.max(18, GRID * 1.5);
    if(gameOver){
      ctx.fillStyle="#e75480";ctx.font=`bold ${fs}px 'Quicksand',sans-serif`;
      ctx.fillText("游戏结束 💔",canvas.width/2,canvas.height/2-20);
      ctx.fillStyle="#d4708a";ctx.font=`${fs*0.6}px 'Quicksand',sans-serif`;
      ctx.fillText(`得分: ${score}`,canvas.width/2,canvas.height/2+16);
      ctx.fillStyle="#c08090";ctx.font=`${fs*0.5}px 'Quicksand',sans-serif`;
      ctx.fillText("点击画面重新开始",canvas.width/2,canvas.height/2+42);
    } else if(paused){
      ctx.fillStyle="#e75480";ctx.font=`bold ${fs}px 'Quicksand',sans-serif`;
      ctx.fillText("已暂停 🌸",canvas.width/2,canvas.height/2-8);
      ctx.fillStyle="#d4708a";ctx.font=`${fs*0.55}px 'Quicksand',sans-serif`;
      ctx.fillText("点击画面继续",canvas.width/2,canvas.height/2+22);
    }
  }

  function draw(){ctx.fillStyle=BG_COLOR;ctx.fillRect(0,0,canvas.width,canvas.height);drawGrid();drawFood();drawSnake();drawParticles();drawOverlay();}
  function animate(){updateParticles();draw();requestAnimationFrame(animate);}

  function changeDir(dx,dy){if(gameOver)return;if(dx===-dir.x&&dy===-dir.y&&snake.length>1)return;nextDir={x:dx,y:dy};}

  function startGame() {
    if(gameLoop)clearInterval(gameLoop);
    init();gameLoop=setInterval(step,speed);resizeCanvas();draw();
  }

  window.addEventListener("keydown",(e)=>{
    const k=e.key.toLowerCase();
    if(k==="arrowup"||k==="w"){e.preventDefault();if(!paused)changeDir(0,-1)}
    else if(k==="arrowdown"||k==="s"){e.preventDefault();if(!paused)changeDir(0,1)}
    else if(k==="arrowleft"||k==="a"){e.preventDefault();if(!paused)changeDir(-1,0)}
    else if(k==="arrowright"||k==="d"){e.preventDefault();if(!paused)changeDir(1,0)}
    else if(k===" "||k==="spacebar"){e.preventDefault();
      if(gameOver)startGame();
      else{paused=!paused;if(paused){if(gameLoop)clearInterval(gameLoop);gameLoop=null}else{gameLoop=setInterval(step,speed)}draw();}
    }else if(k==="r"){e.preventDefault();startGame();}
  });

  // -- Touch / Click support --
  let touchStart=null,touchMoved=false;

  canvas.addEventListener("touchstart",(e)=>{
    e.preventDefault();touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};touchMoved=false;
  },{passive:false});

  canvas.addEventListener("touchmove",(e)=>{touchMoved=true;},{passive:false});

  canvas.addEventListener("touchend",(e)=>{
    e.preventDefault();
    if(gameOver||paused){startGame();touchStart=null;return;}
    if(!touchStart)return;
    const dx=e.changedTouches[0].clientX-touchStart.x;
    const dy=e.changedTouches[0].clientY-touchStart.y;
    const adx=Math.abs(dx),ady=Math.abs(dy);
    if(Math.max(adx,ady)<15)return;
    if(adx>ady)changeDir(dx>0?1:-1,0);else changeDir(0,dy>0?1:-1);
    touchStart=null;
  },{passive:false});

  // Click to start/restart/resume
  canvas.addEventListener("click",(e)=>{
    if(gameOver||paused)startGame();
  });

  window.addEventListener("resize",()=>{resizeCanvas();draw();});

    // D-pad touch controls
  document.getElementById("dpadUp").addEventListener("click",()=>{if(!paused)changeDir(0,-1)});
  document.getElementById("dpadDown").addEventListener("click",()=>{if(!paused)changeDir(0,1)});
  document.getElementById("dpadLeft").addEventListener("click",()=>{if(!paused)changeDir(-1,0)});
  document.getElementById("dpadRight").addEventListener("click",()=>{if(!paused)changeDir(1,0)});
  document.getElementById("dpadPause").addEventListener("click",()=>{
    if(gameOver){startGame()}else{paused=!paused;if(paused){if(gameLoop)clearInterval(gameLoop);gameLoop=null}else{gameLoop=setInterval(step,speed)}draw();}
  });
  best=getHighScore("snake");bestEl.textContent=best;
  init();draw();animate();
})();
</script>
</body>
</html>
