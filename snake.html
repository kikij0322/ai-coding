<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🍬 糖果贪吃蛇</title>
<link rel="icon" href="/favicon.svg" />
<link rel="stylesheet" href="/src/styles/shared.css" />
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .title-ribbon {
    background: linear-gradient(135deg, var(--pink-deep), var(--pink));
    color: #fff;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    padding: 8px 28px;
    border-radius: 30px;
    box-shadow: var(--shadow-md);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .score-panel {
    display: flex;
    gap: 14px;
  }

  .stat {
    text-align: center;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(8px);
    padding: 10px 18px;
    border-radius: var(--radius-md);
    border: 2px solid var(--pink);
    box-shadow: var(--shadow-sm);
    min-width: 68px;
  }
  .stat-label {
    color: var(--text-light);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stat-value {
    color: var(--pink-deep);
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-value.best { color: #e75480; }

  .canvas-frame {
    background: #fff;
    border-radius: var(--radius-lg);
    padding: 10px;
    box-shadow: var(--shadow-lg), 0 0 0 3px var(--pink);
  }

  canvas {
    border-radius: var(--radius-md);
    display: block;
    background: #fff5f8;
  }

  .controls-hint {
    color: var(--text-light);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .controls-hint span {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  kbd {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    background: #fff;
    color: var(--pink-deep);
    font-size: 11px;
    font-family: var(--font-display);
    font-weight: 600;
    border: 2px solid var(--pink);
    box-shadow: 0 2px 6px rgba(255, 182, 193, 0.2);
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="title-ribbon">🍬 糖果贪吃蛇</div>

  <div class="score-panel">
    <div class="stat">
      <div class="stat-label">⭐ 得分</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">🏆 最高</div>
      <div class="stat-value best" id="best">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">🍬 长度</div>
      <div class="stat-value" id="lengthVal">3</div>
    </div>
  </div>

  <div class="canvas-frame">
    <canvas id="game" width="600" height="600"></canvas>
  </div>

  <div class="controls-hint">
    <span><kbd>↑↓←→</kbd> / <kbd>WASD</kbd> 移动</span>
    <span><kbd>空格</kbd> 暂停</span>
    <span><kbd>R</kbd> 重新开始</span>
  </div>
</div>

<!-- 返回大厅 -->
<a href="index.html" class="back-btn">← 大厅</a>

<script type="module">
import { getHighScore, setHighScore } from "/src/js/storage.js";

(function() {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const lengthEl = document.getElementById("lengthVal");

  const GRID = 20;
  const COLS = canvas.width / GRID;
  const ROWS = canvas.height / GRID;

  const BG_COLOR = "#fff5f8";
  const GRID_LINE = "#ffe4ec";
  const HEAD_COLOR = "#ffb6c1";
  const HEAD_SHINE = "#ffd0dc";
  const BODY_COLOR = "#ff9ec4";
  const BODY_ALT = "#f8a0b8";
  const FOOD_COLOR = "#ff6b8a";
  const OVERLAY_BG = "rgba(255, 240, 245, 0.88)";

  let snake = [];
  let food = null;
  let dir = { x: 1, y: 0 };
  let nextDir = { x: 1, y: 0 };
  let score = 0;
  let best = getHighScore("snake");
  let speed = 120;
  let gameLoop = null;
  let paused = true;
  let gameOver = true;
  let particles = [];
  let foodEmoji = "🍬";
  const candyEmojis = ["🍬", "🍭", "🍡", "🍫", "🧁", "🍪", "🍩", "🍦"];

  function init() {
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    snake = [
      { x: cx, y: cy },
      { x: cx - 1, y: cy },
      { x: cx - 2, y: cy },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 120;
    food = null;
    particles = [];
    gameOver = false;
    paused = false;
    foodEmoji = candyEmojis[Math.floor(Math.random() * candyEmojis.length)];
    spawnFood();
    updateUI();
    bestEl.textContent = best;
  }

  function spawnFood() {
    const pool = [];
    const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        if (!occupied.has(`${x},${y}`)) pool.push({ x, y });
      }
    }
    if (pool.length === 0) return;
    food = pool[Math.floor(Math.random() * pool.length)];
  }

  function updateUI() {
    scoreEl.textContent = score;
    lengthEl.textContent = snake.length;
    if (score > best) {
      best = score;
      setHighScore("snake", best);
      bestEl.textContent = best;
    }
  }

  function step() {
    if (paused || gameOver) return;
    dir = { ...nextDir };
    const head = snake[0];
    const newHead = { x: head.x + dir.x, y: head.y + dir.y };

    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
      endGame(); return;
    }
    for (const seg of snake) {
      if (seg.x === newHead.x && seg.y === newHead.y) { endGame(); return; }
    }

    snake.unshift(newHead);

    if (food && newHead.x === food.x && newHead.y === food.y) {
      score += 10;
      spawnParticles(food.x, food.y);
      food = null;
      foodEmoji = candyEmojis[Math.floor(Math.random() * candyEmojis.length)];
      spawnFood();
      updateUI();
      if (speed > 60) { speed -= 1; restartLoop(); }
    } else {
      snake.pop();
    }
  }

  function restartLoop() {
    if (gameLoop) clearInterval(gameLoop);
    if (!gameOver && !paused) gameLoop = setInterval(step, speed);
  }

  function endGame() {
    gameOver = true;
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = null;
    spawnDeathParticles(snake[0].x, snake[0].y);
    draw();
  }

  function spawnParticles(gx, gy) {
    for (let i = 0; i < 10; i++) {
      particles.push({
        x: gx * GRID + GRID / 2, y: gy * GRID + GRID / 2,
        vx: (Math.random() - 0.5) * 3, vy: (Math.random() - 0.5) * 3 - 1,
        life: 1, decay: 0.025 + Math.random() * 0.03,
        color: "#ffb6c1", size: 3,
      });
    }
  }

  function spawnDeathParticles(gx, gy) {
    for (let i = 0; i < 15; i++) {
      particles.push({
        x: gx * GRID + GRID / 2, y: gy * GRID + GRID / 2,
        vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5,
        life: 1, decay: 0.015 + Math.random() * 0.02,
        color: "#ffb6c1", size: 3,
      });
    }
  }

  function updateParticles() {
    particles = particles.filter(p => {
      p.x += p.vx; p.y += p.vy; p.life -= p.decay;
      return p.life > 0;
    });
  }

  function drawGrid() {
    ctx.strokeStyle = GRID_LINE;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke();
    }
  }

  function drawSnake() {
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const pad = 1.5;
      const x = s.x * GRID + pad;
      const y = s.y * GRID + pad;
      const w = GRID - pad * 2;

      if (i === 0) {
        const cx = x + w / 2, cy = y + w / 2, r = w / 2;

        ctx.shadowColor = "rgba(255, 105, 180, 0.4)"; ctx.shadowBlur = 4;
        ctx.fillStyle = HEAD_COLOR;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;

        // ears
        const earR = r * 0.45, earOff = r * 0.55;
        ctx.fillStyle = HEAD_COLOR;
        ctx.beginPath(); ctx.arc(cx - earOff, cy - earOff, earR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + earOff, cy - earOff, earR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#ffd0dc";
        ctx.beginPath(); ctx.arc(cx - earOff, cy - earOff, earR * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + earOff, cy - earOff, earR * 0.6, 0, Math.PI * 2); ctx.fill();

        // bow
        let bx, by;
        if (dir.x === 1) { bx = cx + r * 0.5; by = cy - r * 0.55; }
        else if (dir.x === -1) { bx = cx - r * 0.5; by = cy - r * 0.55; }
        else if (dir.y === -1) { bx = cx; by = cy - r * 0.85; }
        else { bx = cx; by = cy - r * 0.25; }

        ctx.fillStyle = "#ff1744";
        ctx.beginPath(); ctx.arc(bx, by, r * 0.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(bx - r * 0.4, by - r * 0.15, r * 0.35, r * 0.18, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(bx + r * 0.4, by - r * 0.15, r * 0.35, r * 0.18, 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(bx - r * 0.15, by + r * 0.1); ctx.lineTo(bx - r * 0.25, by + r * 0.45); ctx.lineTo(bx - r * 0.05, by + r * 0.3); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(bx + r * 0.15, by + r * 0.1); ctx.lineTo(bx + r * 0.25, by + r * 0.45); ctx.lineTo(bx + r * 0.05, by + r * 0.3); ctx.closePath(); ctx.fill();

        // eyes
        const eyeR = r * 0.28;
        let ex1, ey1, ex2, ey2;
        if (dir.x === 1) { ex1 = cx + r * 0.15; ey1 = cy - r * 0.1; ex2 = cx + r * 0.55; ey2 = cy - r * 0.1; }
        else if (dir.x === -1) { ex1 = cx - r * 0.15; ey1 = cy - r * 0.1; ex2 = cx - r * 0.55; ey2 = cy - r * 0.1; }
        else if (dir.y === -1) { ex1 = cx - r * 0.25; ey1 = cy - r * 0.35; ex2 = cx + r * 0.25; ey2 = cy - r * 0.35; }
        else { ex1 = cx - r * 0.25; ey1 = cy + r * 0.1; ex2 = cx + r * 0.25; ey2 = cy + r * 0.1; }

        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI * 2); ctx.arc(ex2, ey2, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#1a1a2e";
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeR * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeR * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(ex1 - eyeR * 0.2, ey1 - eyeR * 0.2, eyeR * 0.25, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2 - eyeR * 0.2, ey2 - eyeR * 0.2, eyeR * 0.25, 0, Math.PI * 2); ctx.fill();

        // nose
        let nx, ny;
        if (dir.x === 1) { nx = cx + r * 0.65; ny = cy + r * 0.15; }
        else if (dir.x === -1) { nx = cx - r * 0.65; ny = cy + r * 0.15; }
        else if (dir.y === -1) { nx = cx; ny = cy - r * 0.65; }
        else { nx = cx; ny = cy + r * 0.5; }

        ctx.fillStyle = "#ffdd57";
        ctx.beginPath(); ctx.ellipse(nx, ny, r * 0.14, r * 0.1, 0, 0, Math.PI * 2); ctx.fill();

        // whiskers
        ctx.strokeStyle = "rgba(0,0,0,0.18)"; ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.moveTo(nx - r * 0.9, ny - r * 0.25); ctx.lineTo(nx - r * 0.3, ny - r * 0.05); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(nx - r * 0.9, ny + r * 0.05); ctx.lineTo(nx - r * 0.3, ny + r * 0.1); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(nx + r * 0.9, ny - r * 0.25); ctx.lineTo(nx + r * 0.3, ny - r * 0.05); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(nx + r * 0.9, ny + r * 0.05); ctx.lineTo(nx + r * 0.3, ny + r * 0.1); ctx.stroke();

      } else {
        const bodyR = w / 2, bcx = x + w / 2, bcy = y + w / 2;
        ctx.fillStyle = i % 2 === 0 ? BODY_ALT : BODY_COLOR;
        ctx.shadowColor = "rgba(255, 105, 180, 0.2)"; ctx.shadowBlur = 2;
        ctx.beginPath(); ctx.arc(bcx, bcy, bodyR, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.beginPath(); ctx.arc(bcx - bodyR * 0.25, bcy - bodyR * 0.25, bodyR * 0.3, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  function drawFood() {
    if (!food) return;
    const cx = food.x * GRID + GRID / 2;
    const cy = food.y * GRID + GRID / 2;
    const r = GRID / 2 - 2;

    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r + 4);
    glow.addColorStop(0, "rgba(255, 107, 138, 0.22)"); glow.addColorStop(1, "transparent");
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, r + 4, 0, Math.PI * 2); ctx.fill();

    // Lollipop / candy shape
    ctx.fillStyle = FOOD_COLOR;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

    // spiral pattern
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let a = 0; a < Math.PI * 4; a += 0.3) {
      const rr = (a / (Math.PI * 4)) * r * 0.8;
      const px = cx + Math.cos(a) * rr;
      const py = cy + Math.sin(a) * rr;
      if (a === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // shine
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.beginPath(); ctx.arc(cx - r * 0.25, cy - r * 0.3, r * 0.28, 0, Math.PI * 2); ctx.fill();
  }

  function drawHeart(ctx, x, y, size) {
    ctx.beginPath();
    ctx.moveTo(x, y + size * 0.3);
    ctx.bezierCurveTo(x, y - size * 0.1, x - size, y - size * 0.1, x - size, y + size * 0.3);
    ctx.bezierCurveTo(x - size, y + size * 0.8, x, y + size, x, y + size);
    ctx.bezierCurveTo(x, y + size, x + size, y + size * 0.8, x + size, y + size * 0.3);
    ctx.bezierCurveTo(x + size, y - size * 0.1, x, y - size * 0.1, x, y + size * 0.3);
    ctx.closePath();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      drawHeart(ctx, p.x, p.y, p.size);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawOverlay() {
    if (!paused && !gameOver) return;
    ctx.fillStyle = OVERLAY_BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    if (gameOver) {
      ctx.fillStyle = "#e75480";
      ctx.font = "bold 34px 'Quicksand', 'PingFang SC', sans-serif";
      ctx.fillText("游戏结束 💔", canvas.width / 2, canvas.height / 2 - 30);
      ctx.fillStyle = "#d4708a";
      ctx.font = "18px 'Quicksand', 'PingFang SC', sans-serif";
      ctx.fillText(`得分: ${score}  ⭐`, canvas.width / 2, canvas.height / 2 + 12);
      ctx.fillStyle = "#c08090";
      ctx.font = "15px 'Quicksand', 'PingFang SC', sans-serif";
      ctx.fillText("按 R 或 空格 重新开始 ♡", canvas.width / 2, canvas.height / 2 + 44);
    } else if (paused) {
      ctx.fillStyle = "#e75480";
      ctx.font = "bold 30px 'Quicksand', 'PingFang SC', sans-serif";
      ctx.fillText("已暂停 🌸", canvas.width / 2, canvas.height / 2 - 12);
      ctx.fillStyle = "#d4708a";
      ctx.font = "17px 'Quicksand', 'PingFang SC', sans-serif";
      ctx.fillText("按 空格 继续", canvas.width / 2, canvas.height / 2 + 22);
    }
  }

  function draw() {
    ctx.fillStyle = BG_COLOR; ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid(); drawFood(); drawSnake(); drawParticles(); drawOverlay();
  }

  function animate() {
    updateParticles(); draw(); requestAnimationFrame(animate);
  }

  function changeDir(dx, dy) {
    if (gameOver) return;
    if (dx === -dir.x && dy === -dir.y && snake.length > 1) return;
    nextDir = { x: dx, y: dy };
  }

  window.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();
    if (key === "arrowup" || key === "w") { e.preventDefault(); if (!paused) changeDir(0, -1); }
    else if (key === "arrowdown" || key === "s") { e.preventDefault(); if (!paused) changeDir(0, 1); }
    else if (key === "arrowleft" || key === "a") { e.preventDefault(); if (!paused) changeDir(-1, 0); }
    else if (key === "arrowright" || key === "d") { e.preventDefault(); if (!paused) changeDir(1, 0); }
    else if (key === " " || key === "spacebar") {
      e.preventDefault();
      if (gameOver) { init(); gameLoop = setInterval(step, speed); }
      else {
        paused = !paused;
        if (paused) { if (gameLoop) clearInterval(gameLoop); gameLoop = null; }
        else { gameLoop = setInterval(step, speed); }
      }
    } else if (key === "r") {
      e.preventDefault();
      if (gameLoop) clearInterval(gameLoop);
      init(); gameLoop = setInterval(step, speed);
    }
  });

  let touchStart = null;
  canvas.addEventListener("touchstart", (e) => {
    e.preventDefault(); touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: false });
  canvas.addEventListener("touchend", (e) => {
    e.preventDefault();
    if (!touchStart || gameOver || paused) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) changeDir(dx > 0 ? 1 : -1, 0);
    else changeDir(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: false });

  bestEl.textContent = best;
  init(); draw(); animate();
})();
</script>
</body>
</html>
