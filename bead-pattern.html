<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼豆图纸生成器 - Pixel Bead Pattern</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .sub { color: #8899aa; font-size: 13px; }
  main { display: flex; flex: 1; gap: 0; }
  .sidebar {
    width: 280px;
    background: #16213e;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-right: 1px solid #0f3460;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: auto;
    background:
      repeating-conic-gradient(#2a2a3e 0% 25%, transparent 0% 50%) 50% / 20px 20px;
  }
  .canvas-area canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  .upload-zone {
    border: 2px dashed #0f3460;
    border-radius: 8px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #1a1a2e;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: #e94560;
    background: #1e1e36;
  }
  .upload-zone p { color: #8899aa; font-size: 13px; margin-top: 8px; }
  .upload-zone .icon { font-size: 32px; }
  label.ctrl {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 12px; color: #8899aa; text-transform: uppercase; letter-spacing: 0.5px;
  }
  label.ctrl input[type=range] { accent-color: #e94560; }
  label.ctrl input[type=number], label.ctrl select {
    background: #1a1a2e; border: 1px solid #0f3460; color: #e0e0e0;
    padding: 6px 8px; border-radius: 4px; font-size: 13px; width: 100%;
  }
  .btn-row { display: flex; gap: 8px; }
  button, .btn {
    padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: #e94560; color: #fff; flex: 1; justify-content: center; }
  .btn-primary:hover { background: #d63850; }
  .btn-ghost { background: transparent; color: #8899aa; border: 1px solid #0f3460; }
  .btn-ghost:hover { background: #1a1a2e; color: #fff; }
  .btn-small { padding: 4px 10px; font-size: 11px; }
  .preset-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .preset-row button { flex: 1; min-width: 48px; }
  .palette { margin-top: 8px; }
  .palette h3 { font-size: 12px; color: #8899aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .palette-list { display: flex; flex-direction: column; gap: 4px; max-height: 240px; overflow-y: auto; }
  .palette-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .palette-swatch {
    width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .palette-name { flex: 1; color: #ccc; } .palette-code { color: #e94560; font-weight: 600; margin-right: 2px; font-variant-numeric: tabular-nums; }
  .palette-count { color: #8899aa; font-variant-numeric: tabular-nums; }
  .stat-row { display: flex; justify-content: space-between; font-size: 12px; color: #8899aa; }
  .stat-row span:last-child { color: #e0e0e0; font-weight: 500; }
  .divider { border-top: 1px solid #0f3460; margin: 4px 0; }
  #fileInput { display: none; }
  .unsupported { display: none; text-align: center; padding: 40px; color: #8899aa; }
  .empty-state { text-align: center; color: #556; }
  .empty-state .big-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }
  .hidden { display: none !important; }

</head>
<body>
<header>
  <h1>🎨 拼豆图纸生成器</h1>
  <span class="sub">上传图片 → 像素化 → Artkal 色板匹配 → 导出图纸</span>
</header>
<main>
  <aside class="sidebar">
    <div class="upload-zone" id="dropZone">
      <div class="icon">🖼️</div>
      <p>拖放图片到此处<br>或点击选择文件</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="divider"></div>

    <label class="ctrl">画板尺寸
      <select id="boardPreset">
        <option value="custom">自定义</option>
        <option value="29">29×29 小方板</option>
        <option value="50" selected>50×50 大方板</option>
        <option value="64">64×64</option>
        <option value="80">80×80</option>
        <option value="100">100×100</option>
      </select>
    </label>

    <label class="ctrl">宽度（豆子数）
      <input type="range" id="widthSlider" min="8" max="120" value="50">
      <input type="number" id="widthInput" min="8" max="120" value="50">
    </label>

    <label class="ctrl">高度（豆子数）
      <input type="range" id="heightSlider" min="8" max="120" value="50">
      <input type="number" id="heightInput" min="8" max="120" value="50">
    </label>

    <div class="btn-row">
      <button id="gridToggle" class="btn-ghost btn-small">▦ 网格开</button>
      <button id="outlineToggle" class="btn-ghost btn-small">⬛ 黑框</button>
      <button id="codeToggle" class="btn-ghost btn-small">S# 色号</button>
    </div>
    <div class="divider"></div>
    <label class="ctrl">缩放
      <div class="btn-row" style="align-items:center;">
        <button id="zoomOutBtn" class="btn-ghost btn-small" style="flex:0 0 32px;padding:4px 0;">−</button>
        <span id="zoomLabel" style="flex:1;text-align:center;font-size:13px;color:#e0e0e0;">100%</span>
        <button id="zoomInBtn" class="btn-ghost btn-small" style="flex:0 0 32px;padding:4px 0;">+</button>
        <button id="zoomFitBtn" class="btn-ghost btn-small" style="flex:0 0 auto;padding:4px 8px;">适配</button>
      </div>
    </label>    <div class="divider"></div>    <button id="downloadBtn" class="btn-primary hidden" disabled>📥 下载图纸 (PNG)</button>

    <div class="divider hidden" id="statsDivider"></div>
    <div class="stat-row hidden" id="statTotal"><span>总豆子数</span><span id="totalBeads">-</span></div>
    <div class="stat-row hidden" id="statColors"><span>使用颜色</span><span id="usedColors">-</span></div>

    <div class="palette hidden" id="paletteSection">
      <h3>颜色清单</h3>
      <div class="palette-list" id="paletteList"></div>
    </div>
  </aside>
  <section class="canvas-area" id="canvasArea">
    <div class="empty-state" id="emptyState">
      <div class="big-icon">🧩</div>
      <p>上传一张图片开始制作拼豆图纸</p>
    </div>
    <canvas id="outputCanvas" class="hidden"></canvas>
  </section>
</main>

// Parse hex to RGB
function hexToRgb(h) {
  return [
    parseInt(h.slice(1,3), 16),
    parseInt(h.slice(3,5), 16),
    parseInt(h.slice(5,7), 16)
  ];
}
const BEAD_RGB = BEAD_PALETTE.map(b => ({ ...b, rgb: hexToRgb(b.hex) }));

// Find nearest bead color
function nearestBead(r, g, b, alpha) {
  if (alpha < 128) {
    // Transparent → treat as white/clear
    return BEAD_RGB.find(b => b.code === 'T01');
  }
  let minDist = Infinity, best = BEAD_RGB[0];
  for (const bead of BEAD_RGB) {
    const dr = r - bead.rgb[0], dg = g - bead.rgb[1], db = b - bead.rgb[2];
    // Weighted distance (human perception)
    const dist = 2*dr*dr + 4*dg*dg + 3*db*db;
    if (dist < minDist) { minDist = dist; best = bead; }
  }
  return best;
}

// ── State ──────────────────────────────────────────────────
let sourceImage = null;
let showGrid = true;
let showOutline = false;
let showCodes = true;
let zoomLevel = 1.0;

// ── DOM refs ───────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const widthSlider = document.getElementById('widthSlider');
const widthInput = document.getElementById('widthInput');
const heightSlider = document.getElementById('heightSlider');
const heightInput = document.getElementById('heightInput');
const boardPreset = document.getElementById('boardPreset');
const gridToggle = document.getElementById('gridToggle');
const outlineToggle = document.getElementById('outlineToggle');
const codeToggle = document.getElementById('codeToggle');
const zoomInBtn = document.getElementById('zoomInBtn');

const zoomFitBtn = document.getElementById('zoomFitBtn');
const zoomLabel = document.getElementById('zoomLabel');

const outputCanvas = document.getElementById('outputCanvas');
const emptyState = document.getElementById('emptyState');
const canvasArea = document.getElementById('canvasArea');

// ── Upload ─────────────────────────────────────────────────
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files.length) loadImage(e.target.files[0]);
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
});

function loadImage(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      // Auto-set dimensions to maintain aspect ratio
      const ar = img.width / img.height;
      const curW = parseInt(widthInput.value) || 50;
      let newW = curW, newH = Math.round(curW / ar);
      if (newH < 8) { newH = 8; newW = Math.round(newH * ar); }
      if (newH > 120) { newH = 120; newW = Math.round(newH * ar); }
      if (newW > 120) { newW = 120; newH = Math.round(newW / ar); }
      widthSlider.value = newW; widthInput.value = newW;
      heightSlider.value = newH; heightInput.value = newH;
      boardPreset.value = 'custom';
      render();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Sync controls ──────────────────────────────────────────
function syncWidth(v) { widthSlider.value = v; widthInput.value = v; boardPreset.value = 'custom'; render(); }
function syncHeight(v) { heightSlider.value = v; heightInput.value = v; boardPreset.value = 'custom'; render(); }
widthSlider.addEventListener('input', () => syncWidth(widthSlider.value));
widthInput.addEventListener('change', () => { let v = Math.min(120, Math.max(8, parseInt(widthInput.value)||50)); syncWidth(v); });
heightSlider.addEventListener('input', () => syncHeight(heightSlider.value));
heightInput.addEventListener('change', () => { let v = Math.min(120, Math.max(8, parseInt(heightInput.value)||50)); syncHeight(v); });

boardPreset.addEventListener('change', () => {
  const v = boardPreset.value;
  if (v === 'custom') return;
  const n = parseInt(v);
  widthSlider.value = n; widthInput.value = n;
  heightSlider.value = n; heightInput.value = n;
  render();
});

gridToggle.addEventListener('click', () => {
  showGrid = !showGrid;
  gridToggle.textContent = showGrid ? '▦ 网格开' : '▦ 网格关';
  render();
});

outlineToggle.addEventListener('click', () => {
  showOutline = !showOutline;
  outlineToggle.textContent = showOutline ? '⬛ 黑框' : '⬜ 无框';
  render();
}

codeToggle.addEventListener('click', () => {
  showCodes = !showCodes;
  codeToggle.textContent = showCodes ? 'S# 色号' : 'S# 隐藏';
  render();
});
zoomInBtn.addEventListener('click', () => {
  zoomLevel = Math.min(5, zoomLevel + 0.25);
  updateZoomUI();
  render();
});
zoomOutBtn.addEventListener('click', () => {
  zoomLevel = Math.max(0.25, zoomLevel - 0.25);
  updateZoomUI();
  render();
});
zoomFitBtn.addEventListener('click', () => {
  zoomLevel = 1.0;
  updateZoomUI();
  render();
});
function updateZoomUI() {
  zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';
}

downloadBtn.addEventListener('click', () => {
  if (!sourceImage || outputCanvas.classList.contains('hidden')) return;
  // Render at 20px per bead for download
  const pw = parseInt(widthInput.value) || 50;
  const ph = parseInt(heightInput.value) || 50;
  const cellSize = 20;
  const tmp = document.createElement('canvas');
  tmp.width = pw * cellSize;
  tmp.height = ph * cellSize;
  const ctx = tmp.getContext('2d');
  drawPattern(ctx, pw, ph, cellSize, true);
  const a = document.createElement('a');
  a.download = 'bead-pattern.png';
  a.href = tmp.toDataURL('image/png');
  a.click();
});

// ── Posterize: quantize RGB channels to fewer levels ──────
function posterize(r, g, b, levels) {
  const step = 256 / levels;
  return [
    Math.floor(r / step) * step + step / 2,
    Math.floor(g / step) * step + step / 2,
    Math.floor(b / step) * step + step / 2,
  ];
}

// ── Render ─────────────────────────────────────────────────
function drawPattern(ctx, pw, ph, cellSize, forDownload) {
  // Step 1: Draw source image scaled to pixel grid
  const offCanvas = document.createElement('canvas');
  offCanvas.width = pw; offCanvas.height = ph;
  const offCtx = offCanvas.getContext('2d');
  offCtx.drawImage(sourceImage, 0, 0, pw, ph);
  const imageData = offCtx.getImageData(0, 0, pw, ph);
  const pixels = imageData.data;

  // Step 2: Posterize + map each pixel to nearest bead color & count
  const colorCounts = {};
  const beadGrid = []; // 2D grid of bead assignments for outline drawing
  for (let y = 0; y < ph; y++) {
    beadGrid[y] = [];
    for (let x = 0; x < pw; x++) {
      const i = (y * pw + x) * 4;
      let r = pixels[i], g = pixels[i+1], b = pixels[i+2], a = pixels[i+3];
      // Posterize to merge similar shades
      const [pr, pg, pb] = posterize(r, g, b, 6);
      const bead = nearestBead(pr, pg, pb, a);
      beadGrid[y][x] = bead;
      const key = bead.name;
      colorCounts[key] = (colorCounts[key] || 0) + 1;
    }
  }

  // Step 3: Draw beads (flat, no shading)
  for (let y = 0; y < ph; y++) {
    for (let x = 0; x < pw; x++) {
      const bead = beadGrid[y][x];
      ctx.fillStyle = bead.hex;
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);

      // Color code label
      if (showCodes && cellSize >= 16) {
        const luminance = 0.299 * bead.rgb[0] + 0.587 * bead.rgb[1] + 0.114 * bead.rgb[2];
        const textColor = luminance > 140 ? '#1a1a1a' : '#ffffff';
        ctx.fillStyle = textColor;
        ctx.font = `bold ${Math.max(8, cellSize * 0.38)}px -apple-system, "Segoe UI", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(bead.code, x * cellSize + cellSize/2, y * cellSize + cellSize/2);
      }
    }
  }

  // Step 3b: Black outline borders between color regions
  if (showOutline && !forDownload && cellSize >= 6) {
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = Math.max(1, cellSize * 0.12);
    for (let y = 0; y < ph; y++) {
      for (let x = 0; x < pw; x++) {
        const bead = beadGrid[y][x];
        const bx = x * cellSize, by = y * cellSize;
        // Right edge
        if (x < pw - 1 && beadGrid[y][x+1].name !== bead.name) {
          ctx.beginPath();
          ctx.moveTo(bx + cellSize, by);
          ctx.lineTo(bx + cellSize, by + cellSize);
          ctx.stroke();
        }
        // Bottom edge
        if (y < ph - 1 && beadGrid[y+1][x].name !== bead.name) {
          ctx.beginPath();
          ctx.moveTo(bx, by + cellSize);
          ctx.lineTo(bx + cellSize, by + cellSize);
          ctx.stroke();
        }
        // Left edge (only for first column or boundary)
        if (x === 0 || (x > 0 && beadGrid[y][x-1].name !== bead.name)) {
          ctx.beginPath();
          ctx.moveTo(bx, by);
          ctx.lineTo(bx, by + cellSize);
          ctx.stroke();
        }
        // Top edge (only for first row or boundary)
        if (y === 0 || (y > 0 && beadGrid[y-1][x].name !== bead.name)) {
          ctx.beginPath();
          ctx.moveTo(bx, by);
          ctx.lineTo(bx + cellSize, by);
          ctx.stroke();
        }
      }
    }
  }

  // Step 4: Grid lines
  if (showGrid) {
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= pw; x++) {
      ctx.beginPath();
      ctx.moveTo(x * cellSize, 0);
      ctx.lineTo(x * cellSize, ph * cellSize);
      ctx.stroke();
    }
    for (let y = 0; y <= ph; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * cellSize);
      ctx.lineTo(pw * cellSize, y * cellSize);
      ctx.stroke();
    }
  }function render() {
  if (!sourceImage) return;

  const pw = parseInt(widthInput.value) || 50;
  const ph = parseInt(heightInput.value) || 50;

  // Calculate base cell size to fit viewport, then apply zoom
  const maxW = canvasArea.clientWidth - 48;
  const maxH = canvasArea.clientHeight - 48;
  const baseCell = Math.max(8, Math.min(40, Math.floor(Math.min(maxW / pw, maxH / ph))));
  const cellSize = Math.max(4, Math.round(baseCell * zoomLevel));

  outputCanvas.width = pw * cellSize;
  outputCanvas.height = ph * cellSize;
  const ctx = outputCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const colorCounts = drawPattern(ctx, pw, ph, cellSize, false);
  updateStats(colorCounts, pw, ph);

  emptyState.classList.add('hidden');
  outputCanvas.classList.remove('hidden');
  downloadBtn.classList.remove('hidden');
  document.getElementById('statsDivider').classList.remove('hidden');
  document.getElementById('statTotal').classList.remove('hidden');
  document.getElementById('statColors').classList.remove('hidden');
  document.getElementById('paletteSection').classList.remove('hidden');
}

function updateStats(colorCounts, pw, ph) {
  const total = pw * ph;
  document.getElementById('totalBeads').textContent = total;
  const entries = Object.entries(colorCounts).sort((a,b) => b[1] - a[1]);
  document.getElementById('usedColors').textContent = entries.length;

  const list = document.getElementById('paletteList');
  list.innerHTML = entries.map(([name, count]) => {
    const bead = BEAD_PALETTE.find(b => b.name === name);
    return `<div class="palette-item">
      <div class="palette-swatch" style="background:${bead.hex}"></div>
      <span class="palette-name"><span class="palette-code">${bead.code}</span> ${name.split(' ').slice(1).join(' ')}</span>
      <span class="palette-count">${count}</span>
    </div>`;
  }).join('');
}
